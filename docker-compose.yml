services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: helpbot
      POSTGRES_USER: helpbot
      POSTGRES_PASSWORD: helpbot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpbot -d helpbot"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://helpbot:helpbot@postgres:5432/helpbot
      DOCS_DIR: /app/backend/docs
      PROMPT_PATH: /app/backend/prompt.txt
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
